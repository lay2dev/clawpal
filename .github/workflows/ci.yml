name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify fork workflow files are in sync
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if ! git diff --quiet origin/${{ github.base_ref }} -- .github/workflows/; then
            echo ""
            echo "::error::Your fork's .github/workflows/ files are out of sync with the base branch."
            echo "::error::Please sync your fork with upstream before pushing:"
            echo "::error::  git fetch upstream ${{ github.base_ref }}"
            echo "::error::  git checkout upstream/${{ github.base_ref }} -- .github/workflows/"
            echo "::error::  git commit -m 'sync: align workflow files with upstream'"
            echo "::error::  git push"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Run clippy
        run: cargo clippy -p clawpal-core -- -D warnings
        working-directory: src-tauri

      - name: Run tests
        run: cargo test -p clawpal-core
        working-directory: src-tauri

      - name: Run perf metrics tests
        run: cargo test -p clawpal --test perf_metrics -- --nocapture
        working-directory: src-tauri
